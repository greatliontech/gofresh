name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet github.com/greatliontech/gofresh/...

      - name: gofmt check
        run: test -z "$(gofmt -l .)"

      - name: Tidy check
        run: go mod tidy -diff

      - name: Test
        # The closure package builds whole-program SSA (stdlib bodies
        # included) per fixture; under -race that triples memory and the
        # runner kills the job. The analysis is single-goroutine, so the race
        # detector runs on everything else - including the root-package tests
        # that drive the engine end to end.
        run: |
          go test -race -timeout 30m $(go list ./... | grep -v '/closure')
          go test -timeout 30m ./closure
